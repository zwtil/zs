name: Gather Eligible Repos

on:
    workflow_dispatch:
    schedule:
        - cron: "0 0 * * *" # Run daily at midnight UTC
env:
    IS_ORG: true

jobs:
    gather-repos:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.x"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install PyGithub
                  pip install requests

            - name: Run repo gathering script
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if [ "$IS_ORG" = true ] ; then
                      REPO_URL="https://api.github.com/orgs/${{ github.repository_owner }}/repos"
                  else
                      REPO_URL="https://api.github.com/users/${{ github.repository_owner }}/repos"
                  fi
                  python .github/scripts/gatherRepos.py "$REPO_URL"
            
            - name: Detect Changes
              run: |
                    git diff --name-only HEAD^ HEAD > changes.txt
                    if [ -s changes.txt ]; then
                    echo "Changes detected. Committing and pushing changes."
                    git config --global user.email "actions@github.com"
                    git config --global user.name "GitHub Actions"
                    git add .
                    git commit -m "Gather Eligible Repos: Changes detected"
                    git push origin main
                    else
                    echo "No changes detected."
                    fi
            