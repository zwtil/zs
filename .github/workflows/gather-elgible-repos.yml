name: Gather Eligible Repos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
env:
  IS_ORG : true

jobs:
  gather-repos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub
          pip install requests
          
      - name: Run repo gathering script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
                if [ "$IS_ORG" = true ] ; then
                    REPO_URL="https://api.github.com/orgs/${{ github.repository_owner }}/repos"
                    else
                    REPO_URL="https://api.github.com/users/${{ github.repository_owner }}/repos"
                fi
                python .github/scripts/gatherRepos.py "$REPO_URL"        
      - name: Commit changes
        run: |
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add eligible-repos.json
            git diff --staged --quiet || (git commit -m "Update eligible repos list" && git push)
