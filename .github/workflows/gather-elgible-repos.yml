name: Gather Eligible Repos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC

jobs:
  gather-repos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub
          pip install requests
          
      - name: Run repo gathering script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
                REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY_OWNER}"
                python .github/scripts/gatherRepos.py "$REPO_URL"        
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add eligible-repos.json
          git commit -m "Update eligible repos list" || echo "No changes to commit"
          git push
